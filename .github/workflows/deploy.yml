name: Deploy

# Every push to main: run checks, then SSH into the VPS and roll the
# Docker stack forward (server + web rebuilt, mongo/caddy volumes persist).
# Manual runs allowed via the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Server deps + regression tests
        run: |
          npm --prefix server ci
          npm --prefix server test
      - name: Client install + build (compile check)
        run: |
          npm --prefix client ci
          npm --prefix client run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Belt: only ever deploy from main, even when manually dispatched.
    if: github.ref == 'refs/heads/main'
    # Braces: scope the VPS_* secrets to this environment. Add a
    # deployment branch policy (main only) on the `production` environment
    # in repo Settings → Environments — GitHub then refuses to release the
    # secrets to a run on any other ref, regardless of workflow contents.
    environment: production
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/angio
            git fetch origin main
            git checkout main
            # Match origin exactly — gitignored files (server/.env) are kept.
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
