# Production stack for the Environ API.
#
#   server  — Node/Express API (built from ./server/Dockerfile).
#   web     — React SPA (built from ./client), served on port 80.
#   mongo   — MongoDB 7, data on a named volume, NOT exposed to the host
#             (only the server container can reach it over `internal`).
#
# Public TLS is handled by a SHARED, host-level reverse proxy
# (caddy-docker-proxy, in ~/proxy) on the external `edge` network. This
# stack does NOT run its own Caddy and does NOT bind :80/:443 — it only
# declares routes via container labels. The proxy auto-discovers those
# labels and issues/renews Let's Encrypt certs automatically.
#
# Host prereqs: the `edge` network must exist and the ~/proxy stack must
# be running. deploy.sh and CI create the `edge` network if missing.
#
# Bring up:  docker compose up -d --build
# Logs:      docker compose logs -f server
# Server reads secrets from ./server/.env (create it on the VPS from the
# template — never commit it).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - internal

  server:
    build: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # Point the app at the mongo service on the internal network. This
      # overrides any MONGODB_URI in .env so the container always wins.
      MONGODB_URI: mongodb://mongo:27017/angio
      NODE_ENV: production
      PORT: "4000"
    depends_on:
      - mongo
    # Public route, served by the shared edge proxy.
    labels:
      caddy: api.jainildesai.com
      caddy.reverse_proxy: "{{upstreams 4000}}"
    networks:
      - internal
      - edge

  # Static web client (the React SPA). The edge proxy reverse-proxies
  # environ.<domain> -> web:80 via the labels below.
  web:
    build:
      context: ./client
      args:
        # The browser calls the API cross-subdomain (CORS + cookies).
        VITE_API_BASE_URL: https://api.jainildesai.com
    restart: unless-stopped
    depends_on:
      - server
    labels:
      caddy: environ.jainildesai.com
      caddy.reverse_proxy: "{{upstreams 80}}"
    networks:
      - internal
      - edge

volumes:
  mongo-data:

networks:
  internal:
  # Shared, host-level proxy network (owned by ~/proxy). Declared external
  # so this stack joins it instead of creating/owning it.
  edge:
    external: true
